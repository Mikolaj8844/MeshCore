[promicro_ebyte_sx1262]
extends = nrf52_base
board = promicro_nrf52840
build_flags = ${nrf52_base.build_flags}
  -I variants/promicro_ebyte_sx1262
  -D PROMICRO
  -D SX126X_CURRENT_LIMIT=140
  -D USE_SX1262
  -D RADIO_CLASS=CustomSX1262
  -D WRAPPER_CLASS=CustomSX1262Wrapper
  -D P_LORA_DIO_1=29
  -D PIN_SPI_NSS=6
  -D P_LORA_RESET=31
  -D P_LORA_BUSY=2
  -D PIN_SPI_SCK=8
  -D PIN_SPI_MISO=20
  -D PIN_SPI_MOSI=17
  -D PIN_LED_TX=15
  -D PIN_LED_RX=15
  -D SX126X_DIO2_AS_RF_SWITCH=false
  -D SX126X_TXEN=45
  -D SX126X_RXEN=47
  -D SX126X_DIO3_TCXO_VOLTAGE=1.8
  -D SX126X_RX_BOOSTED_GAIN=0
  -D LORA_TX_POWER=22
  -D PIN_VCC_ON=13
  -D ADC_MULTIPLIER=1.530f
; 1.815f
; Calibrated multiplier for nice!nano divider ratios
  -D USE_LITTLEFS
  -D MAX_CONTACTS=150
  -D OFFLINE_QUEUE_SIZE=128
  -D PIN_WIRE_SDA=24
  -D PIN_WIRE_SCL=22
  -D PIN_OLED_RESET=-1
  -D PIN_BUTTON1=36
  -D USER_BTN_PRESSED=LOW
  -D PIN_ONEWIRE=43
  -D PIN_SERIAL1_TX=11
  -D PIN_SERIAL1_RX=32
  -D ENV_INCLUDE_GPS=1
  -D ENV_INCLUDE_AHTX0=1
  -D ENV_INCLUDE_BME280=1
  -D ENV_INCLUDE_BMP280=1
  -D ENV_INCLUDE_INA3221=1
  -D ENV_INCLUDE_INA219=1
  -D HAS_MCU_TEMP=1
build_src_filter = ${nrf52_base.build_src_filter}
  +<helpers/sensors>
  +<../variants/promicro_ebyte_sx1262>
lib_deps= ${nrf52_base.lib_deps}
  adafruit/Adafruit SSD1306 @ ^2.5.13
  adafruit/Adafruit INA3221 Library @ ^1.0.1
  adafruit/Adafruit INA219 @ ^1.2.3
  adafruit/Adafruit AHTX0 @ ^2.0.5
  adafruit/Adafruit BME280 Library @ ^2.3.0
  adafruit/Adafruit BMP280 Library@^2.6.8
  stevemarple/MicroNMEA @ ^2.0.6

[env:promicro_ebyte_sx1262_repeater]
extends = promicro_ebyte_sx1262
build_src_filter = ${promicro_ebyte_sx1262.build_src_filter}
  +<../examples/simple_repeater>
  +<helpers/ui/SSD1306Display.cpp>
  +<helpers/ui/MomentaryButton.cpp>
build_flags =
  ${promicro_ebyte_sx1262.build_flags}
  -D ADVERT_NAME='"NRF Repeater"'
  -D ADVERT_LAT=0.0
  -D ADVERT_LON=0.0
  -D ADMIN_PASSWORD='"password01234543210"'
  -D MAX_NEIGHBOURS=50
  -D DISPLAY_CLASS=SSD1306Display
;  -D MESH_PACKET_LOGGING=1
;  -D MESH_DEBUG=1
lib_deps = ${promicro_ebyte_sx1262.lib_deps}
  adafruit/RTClib @ ^2.1.3

[env:promicro_ebyte_sx1262_repeater_bridge_rs232_serial1]
extends = promicro_ebyte_sx1262
build_src_filter = ${promicro_ebyte_sx1262.build_src_filter}
  +<../examples/simple_repeater>
  +<helpers/ui/SSD1306Display.cpp>
  +<helpers/ui/MomentaryButton.cpp>
  +<helpers/bridges/RS232Bridge.cpp>
build_flags =
  ${promicro_ebyte_sx1262.build_flags}
  -D ADVERT_NAME='"NRF RS232 Bridge"'
  -D ADVERT_LAT=0.0
  -D ADVERT_LON=0.0
  -D ADMIN_PASSWORD='"password01234543210"'
  -D MAX_NEIGHBOURS=50
  -D DISPLAY_CLASS=SSD1306Display
  -D WITH_RS232_BRIDGE=Serial1
  -D WITH_RS232_BRIDGE_RX=PIN_SERIAL1_RX
  -D WITH_RS232_BRIDGE_TX=PIN_SERIAL1_TX
  -UENV_INCLUDE_GPS
;  -D BRIDGE_DEBUG=1
;  -D MESH_PACKET_LOGGING=1
;  -D MESH_DEBUG=1
lib_deps = ${promicro_ebyte_sx1262.lib_deps}
  adafruit/RTClib @ ^2.1.3

[env:promicro_ebyte_sx1262_room_server]
extends = promicro_ebyte_sx1262
build_src_filter = ${promicro_ebyte_sx1262.build_src_filter}
  +<../examples/simple_room_server>
  +<helpers/ui/SSD1306Display.cpp>
  +<helpers/ui/MomentaryButton.cpp>
build_flags = ${promicro_ebyte_sx1262.build_flags}
  -D ADVERT_NAME='"NRF ProMicro Room"'
  -D ADVERT_LAT=0.0
  -D ADVERT_LON=0.0
  -D ADMIN_PASSWORD='"password01234543210"'
  -D ROOM_PASSWORD='"hallo01234567890"'
  -D DISPLAY_CLASS=SSD1306Display
;  -D MESH_PACKET_LOGGING=1
;  -D MESH_DEBUG=1
lib_deps = ${promicro_ebyte_sx1262.lib_deps}
  adafruit/RTClib @ ^2.1.3

[env:promicro_ebyte_sx1262_terminal_chat]
extends = promicro_ebyte_sx1262
build_flags = ${promicro_ebyte_sx1262.build_flags}
;  -D MAX_CONTACTS=100
  -D MAX_GROUP_CHANNELS=1
;  -D MESH_PACKET_LOGGING=1
;  -D MESH_DEBUG=1
build_src_filter = ${promicro_ebyte_sx1262.build_src_filter}
  +<../examples/simple_secure_chat/main.cpp>
lib_deps = ${promicro_ebyte_sx1262.lib_deps}
  densaugeo/base64 @ ~1.4.0
  adafruit/RTClib @ ^2.1.3

[env:promicro_ebyte_sx1262_companion_radio_usb]
extends = promicro_ebyte_sx1262
board_build.ldscript = boards/nrf52840_s140_v6_extrafs.ld
board_upload.maximum_size = 712704
build_flags = ${promicro_ebyte_sx1262.build_flags}
  -I examples/companion_radio/ui-new
;  -D MAX_CONTACTS=350
  -D MAX_GROUP_CHANNELS=40
  -D DISPLAY_CLASS=SSD1306Display
; NOTE: DO NOT ENABLE -->  -D MESH_PACKET_LOGGING=1
; NOTE: DO NOT ENABLE -->  -D MESH_DEBUG=1
build_src_filter = ${promicro_ebyte_sx1262.build_src_filter}
  +<helpers/ui/SSD1306Display.cpp>
  +<helpers/ui/MomentaryButton.cpp>
  +<../examples/companion_radio/*.cpp>
  +<../examples/companion_radio/ui-new/*.cpp>
lib_deps = ${promicro_ebyte_sx1262.lib_deps}
  adafruit/RTClib @ ^2.1.3
  densaugeo/base64 @ ~1.4.0

[env:promicro_ebyte_sx1262_companion_radio_ble]
extends = promicro_ebyte_sx1262
board_build.ldscript = boards/nrf52840_s140_v6_extrafs.ld
board_upload.maximum_size = 712704
build_flags = ${promicro_ebyte_sx1262.build_flags}
  -I examples/companion_radio/ui-new
;  -D MAX_CONTACTS=350
  -D MAX_GROUP_CHANNELS=40
  -D BLE_PIN_CODE=086420
  -D BLE_DEBUG_LOGGING=1
  -D OFFLINE_QUEUE_SIZE=256
  -D DISPLAY_CLASS=SSD1306Display
;  -D MESH_PACKET_LOGGING=1
  -D MESH_DEBUG=1
build_src_filter = ${promicro_ebyte_sx1262.build_src_filter}
  +<helpers/nrf52/SerialBLEInterface.cpp>
  +<helpers/ui/SSD1306Display.cpp>
  +<helpers/ui/MomentaryButton.cpp>
  +<../examples/companion_radio/*.cpp>
  +<../examples/companion_radio/ui-new/*.cpp>
lib_deps = ${promicro_ebyte_sx1262.lib_deps}
  adafruit/RTClib @ ^2.1.3
  densaugeo/base64 @ ~1.4.0

[env:promicro_ebyte_sx1262_sensor]
extends = promicro_ebyte_sx1262
build_flags =
  ${promicro_ebyte_sx1262.build_flags}
  -D ADVERT_NAME='"NRF ProMicro Sensor"'
  -D ADVERT_LAT=0.0
  -D ADVERT_LON=0.0
  -D ADMIN_PASSWORD='"password01234543210"'
  -D DISPLAY_CLASS=SSD1306Display
;  -D MESH_PACKET_LOGGING=1
;  -D MESH_DEBUG=1
build_src_filter = ${promicro_ebyte_sx1262.build_src_filter}
  +<helpers/ui/SSD1306Display.cpp>
  +<helpers/ui/MomentaryButton.cpp>
  +<../examples/simple_sensor>
lib_deps =
  ${promicro_ebyte_sx1262.lib_deps}

[env:promicro_ebyte_sx1262_kiss_modem]
extends = promicro_ebyte_sx1262
build_src_filter = ${promicro_ebyte_sx1262.build_src_filter}
  +<../examples/kiss_modem/>
