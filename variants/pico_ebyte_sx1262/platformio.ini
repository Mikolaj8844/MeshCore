; Waveshare RP2040-LoRa-HF/LF
; https://files.waveshare.com/wiki/RP2040-LoRa/Rp2040-lora-sch.pdf

[pico_ebyte_sx1262]
extends = rp2040_base
board = pico
board_build.filesystem_size = 0.5m
build_flags = ${rp2040_base.build_flags}
  -I variants/pico_ebyte_sx1262
  -D SX126X_CURRENT_LIMIT=140
  -D USE_SX1262
  -D RADIO_CLASS=CustomSX1262
  -D WRAPPER_CLASS=CustomSX1262Wrapper
  -D P_LORA_DIO_1=18
  -D P_LORA_NSS=13 ; CS
  -D P_LORA_RESET=22
  -D P_LORA_BUSY=21
  -D P_LORA_SCLK=10
  -D P_LORA_MISO=12
  -D P_LORA_MOSI=11
  -D P_LORA_TX_LED=25
  -D SX126X_DIO2_AS_RF_SWITCH=false
  -D SX126X_TXEN=20
  -D SX126X_RXEN=19
  -D SX126X_DIO3_TCXO_VOLTAGE=1.8
  -D SX126X_RX_BOOSTED_GAIN=0
  -D LORA_TX_POWER=10 ; 22
  -D RP2040_PLATFORM=1
; Debug options
  ; -D DEBUG_RP2040_WIRE=1
  ; -D DEBUG_RP2040_SPI=1
  ; -D DEBUG_RP2040_CORE=1
  ; -D RADIOLIB_DEBUG_SPI=1
  ; -D DEBUG_RP2040_PORT=Serial
build_src_filter = ${rp2040_base.build_src_filter}
  +<PicoEbyteSx1262Board.cpp>
  +<../variants/pico_ebyte_sx1262>
lib_deps = ${rp2040_base.lib_deps}

[env:pico_ebyte_sx1262_repeater]
extends = pico_ebyte_sx1262
build_flags = ${pico_ebyte_sx1262.build_flags}
  -D ADVERT_NAME='"RP2040-LoRa Repeater"'
  -D ADVERT_LAT=0.0
  -D ADVERT_LON=0.0
  -D ADMIN_PASSWORD='"password"'
  -D MAX_NEIGHBOURS=50
;  -D MESH_PACKET_LOGGING=1
;  -D MESH_DEBUG=1
build_src_filter = ${pico_ebyte_sx1262.build_src_filter}
  +<../examples/simple_repeater>

